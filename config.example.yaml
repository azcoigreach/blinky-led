panel:
  width: 128
  height: 32

renderer:
  mode: piomatter
  hardware_mapping: adafruit-hat
  n_addr_lines: 4

api:
  host: 0.0.0.0
  port: 8080

schedule:
  day_brightness: 70
  night_brightness: 25
  day_start_hour: 7
  night_start_hour: 22

providers:
  stocks:
    enabled: true
    primary: finnhub # finnhub | alphavantage | fixture
    fallback: alphavantage
    refresh_seconds: 60
    stale_after_seconds: 180
    symbols: [AAPL, TSLA, NVDA, SPY, QQQ]
    labels:
      SPY: S&P
      QQQ: NASDAQ
    config:
      fixture_price: 510.33
      fixture_percent_change: -0.24
  markets:
    enabled: true
    provider: proxy_etf
    refresh_seconds: 60
    stale_after_seconds: 180
    symbols: [DIA, QQQ, SPY, IWM]
    labels:
      DIA: DOW
      QQQ: NASDAQ
      SPY: S&P
      IWM: RUSSELL
  futures:
    enabled: true
    provider: yahoo
    refresh_seconds: 120
    stale_after_seconds: 300
    symbols: [ES, NQ, YM, CL, GC]
    aliases:
      ES: ES=F
      NQ: NQ=F
      YM: YM=F
      CL: CL=F
      GC: GC=F
  crypto:
    enabled: true
    provider: coingecko
    refresh_seconds: 90
    stale_after_seconds: 240
    symbols: [BTC, ETH, SOL, DOGE]
    aliases:
      BTC: bitcoin
      ETH: ethereum
      SOL: solana
      DOGE: dogecoin

widgets:
  clock:
    enabled: true
    run_mode: page_bound # page_bound | background_always
    refresh_seconds: 1
    ttl_seconds: 2
    retries: 1
    retry_backoff_seconds: 0.25
    fallback_policy: last_known_or_synthetic
    source_label: local-clock
    config:
      use_24h: true
      show_seconds: true
      show_date: false
      display_mode: time
      date_format: "%Y-%m-%d"
  weather:
    enabled: true
    run_mode: page_bound
    refresh_seconds: 120
    ttl_seconds: 300
    retries: 2
    config:
      city: "New York"
  stocks:
    enabled: true
    run_mode: background_always
    refresh_seconds: 90
    ttl_seconds: 180
    retries: 2
    config:
      display_mode: full # full | percent_only
      layout: list
      symbols: [SPY, QQQ]
      primary: fixture
      fallback: ""
      fixture_price: 510.33
      fixture_percent_change: -0.24
  markets:
    enabled: true
    run_mode: page_bound
    refresh_seconds: 90
    ttl_seconds: 180
    retries: 2
    config:
      layout: compact
      symbols: [DIA, QQQ, SPY, IWM]
      labels:
        DIA: DOW
        QQQ: NASDAQ
        SPY: S&P
        IWM: RUSSELL
  futures:
    enabled: true
    run_mode: page_bound
    refresh_seconds: 120
    ttl_seconds: 300
    retries: 2
    config:
      provider: yahoo
      display_mode: percent_only # percent_only | full
      symbols: [ES, NQ, YM, CL]
      aliases:
        ES: ES=F
        NQ: NQ=F
        YM: YM=F
        CL: CL=F
  crypto:
    enabled: true
    run_mode: page_bound
    refresh_seconds: 60
    ttl_seconds: 120
    retries: 2
    config:
      provider: coingecko # coingecko | fixture
      symbols: [BTC, ETH, SOL]
      display_mode: full # full | percent_only
      aliases:
        BTC: bitcoin
        ETH: ethereum
        SOL: solana
      fixture_price: 68000
      fixture_change_percent: 1.2
  gas:
    enabled: true
    run_mode: background_always
    refresh_seconds: 3600
    ttl_seconds: 7200
    retries: 1
    config:
      provider: fixture # fixture | manual | aaa
      region: "US"
      fixture_price: 3.99
      manual_price: 3.89
      endpoint: "https://gasprices.aaa.com/wp-admin/admin-ajax.php" # optional for aaa
  news:
    enabled: true
    run_mode: page_bound
    refresh_seconds: 120
    ttl_seconds: 300
    retries: 2
    config:
      provider: fixture # fixture | rss | newsapi
      feed_url: "https://feeds.reuters.com/reuters/businessNews"
      query: "markets"
      fixture_headlines:
        - "Market breadth turns negative"
        - "Gas futures stabilize"
        - "Weather warnings continue"
  poll:
    enabled: true
    run_mode: page_bound
    refresh_seconds: 300
    ttl_seconds: 600
    retries: 2
    config:
      provider: fixture # fixture | external
      candidate: "Candidate A"
      fixture_percent: 48.2
      endpoint: ""
  system:
    enabled: true
    run_mode: background_always
    refresh_seconds: 5
    ttl_seconds: 10
    retries: 1
    retry_backoff_seconds: 0.4
    fallback_policy: last_known_or_synthetic
    source_label: local-system
    config:
      disk_path: "/"
  custom_text:
    enabled: true
    run_mode: page_bound
    refresh_seconds: 300
    ttl_seconds: 600
    retries: 1
    config:
      message: "Blinky dashboard online"

pages:
  - page_id: overview
    name: Overview
    enabled: true
    layout: two_column
    widgets: [clock, weather]
    duration_seconds: 8
  - page_id: markets
    name: Markets
    enabled: true
    layout: two_column
    widgets: [stocks, markets]
    duration_seconds: 8
  - page_id: derivatives
    name: Derivatives
    enabled: true
    layout: two_column
    widgets: [futures, crypto]
    duration_seconds: 8
  - page_id: ticker
    name: Ticker
    enabled: true
    layout: ticker_only
    widgets: [news]
    duration_seconds: 10
  - page_id: alerts
    name: Alerts
    enabled: true
    layout: alert_fullscreen
    widgets: [custom_text]
    duration_seconds: 6
